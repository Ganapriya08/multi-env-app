# ============================================
# Multi-Environment Deployment Pipeline
# Triggers on push to dev, test, or main branches
# ============================================

name: Multi Environment Deployment

on:
  push:
    branches:
      - dev
      - test
      - main

jobs:
  # ----------------------------------------
  # Build & Validate
  # ----------------------------------------
  build:
    name: 🔨 Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Validate HTML files exist
        run: |
          echo "🔍 Validating project structure..."
          test -f index.html && echo "✅ index.html found" || (echo "❌ index.html missing" && exit 1)
          test -f dashboard.html && echo "✅ dashboard.html found" || (echo "❌ dashboard.html missing" && exit 1)
          test -f style.css && echo "✅ style.css found" || (echo "❌ style.css missing" && exit 1)
          test -f script.js && echo "✅ script.js found" || (echo "❌ script.js missing" && exit 1)
          echo "🎉 All files validated successfully!"

      - name: 📊 Project Stats
        run: |
          echo "📂 Project file count: $(find . -type f -not -path './.git/*' | wc -l)"
          echo "📏 Total size: $(du -sh --exclude=.git . | cut -f1)"

  # ----------------------------------------
  # Deploy to Environment
  # ----------------------------------------
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠 Deploy to Development
        if: github.ref == 'refs/heads/dev'
        run: |
          echo "======================================"
          echo "🛠  DEPLOYING TO DEVELOPMENT"
          echo "======================================"
          echo "Branch:      dev"
          echo "Environment: Development"
          echo "Timestamp:   $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Commit:      ${{ github.sha }}"
          echo "Author:      ${{ github.actor }}"
          echo "--------------------------------------"
          echo "✅ Development deployment successful!"

      - name: 🧪 Deploy to Testing
        if: github.ref == 'refs/heads/test'
        run: |
          echo "======================================"
          echo "🧪  DEPLOYING TO TESTING"
          echo "======================================"
          echo "Branch:      test"
          echo "Environment: Testing"
          echo "Timestamp:   $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Commit:      ${{ github.sha }}"
          echo "Author:      ${{ github.actor }}"
          echo "--------------------------------------"
          echo "🔬 Running pre-deployment checks..."
          echo "✅ Testing deployment successful!"

      - name: 🚀 Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          echo "======================================"
          echo "🚀  DEPLOYING TO PRODUCTION"
          echo "======================================"
          echo "Branch:      main"
          echo "Environment: Production"
          echo "Timestamp:   $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Commit:      ${{ github.sha }}"
          echo "Author:      ${{ github.actor }}"
          echo "--------------------------------------"
          echo "🔒 Running production safety checks..."
          echo "✅ Production deployment successful!"

  # ----------------------------------------
  # Post-Deployment Notification
  # ----------------------------------------
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: 📢 Deployment Summary
        run: |
          echo "======================================"
          echo "📢  DEPLOYMENT SUMMARY"
          echo "======================================"
          echo "Repository:  ${{ github.repository }}"
          echo "Branch:      ${{ github.ref_name }}"
          echo "Status:      ${{ needs.deploy.result }}"
          echo "Workflow:    ${{ github.workflow }}"
          echo "Run ID:      ${{ github.run_id }}"
          echo "======================================"